name: Game Bench Trend

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  gate-and-trend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run game CI gate
        env:
          GAME_BENCH_FRAMES: '3600'
          GAME_BENCH_WARMUP: '300'
          GAME_BENCH_PROFILE: 'mid'
          GAME_BENCH_TIER: 'low'
          GAME_BENCH_CASES: 'G01,G03,G08,G10'
        run: npm run bench:game:ci

      - name: Build weekly trend report
        run: npm run bench:game:trend

      - name: Run hotspot suite
        run: npm run bench:game:hotspots

      - name: Upload bench artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-bench-artifacts
          path: |
            bench/game/out
            bench/game/history
