<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumen Lite 差异对比</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }
    body {
      margin: 0;
      background: #080b13;
      color: #d8e0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    p {
      margin: 0;
      color: #94a3d1;
      font-size: 13px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 13px;
      color: #9caad8;
    }
    input[type="range"] {
      width: 170px;
    }
    button {
      border: 1px solid #324780;
      border-radius: 6px;
      background: #121a32;
      color: #d8e0ff;
      padding: 6px 10px;
      cursor: pointer;
    }
    .grid {
      width: min(96vw, 1120px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .panel {
      border: 1px solid #24315a;
      border-radius: 8px;
      background: #070c18;
      padding: 8px;
    }
    .panel h3 {
      margin: 0 0 6px;
      font-size: 13px;
      color: #a8baf0;
      font-weight: 600;
    }
    .full {
      width: min(96vw, 1120px);
      border: 1px solid #24315a;
      border-radius: 8px;
      background: #070c18;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }
    .full h3 {
      margin: 0;
      font-size: 13px;
      color: #a8baf0;
      font-weight: 600;
    }
    .fullHeatmapMeta {
      margin: 0;
      color: #94a3d1;
      font-size: 13px;
    }
    .full canvas#viewDiff {
      width: 100%;
    }
    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid #24315a;
      border-radius: 6px;
      image-rendering: pixelated;
      background: #060912;
    }
  </style>
</head>
<body>
  <h1>Lumen Lite 差异版</h1>
  <p>左右使用同一场景与同一着色映射：左为 JS 镜像实现，右为 SeedLang 逻辑实现。</p>
  <div class="row">
    <label>底部亮度增益 <input id="lumaGain" type="range" min="1" max="12" step="0.1" value="5.4"></label>
    <label>压力倍数 <input id="stressFactor" type="range" min="1" max="40" step="1" value="1"></label>
    <button id="toggleProbe">显示网格</button>
    <button id="toggleJs">暂停左侧</button>
    <button id="toggleSeed">暂停右侧</button>
    <span id="status" style="color:#9fb1df;font-size:12px">状态：初始化中</span>
  </div>
  <div class="grid">
    <section class="panel">
      <h3>JS Mirror FPS: <span id="fpsJs">0</span></h3>
      <p>compute: <span id="jsComputeMs">0.00</span>ms | present: <span id="jsPresentMs">0.00</span>ms</p>
      <canvas id="viewJs" width="320" height="180"></canvas>
    </section>
    <section class="panel">
      <h3>SeedLang FPS: <span id="fpsSeed">0</span></h3>
      <p>compute: <span id="seedComputeMs">0.00</span>ms | present: <span id="seedPresentMs">0.00</span>ms</p>
      <canvas id="viewSeed" width="320" height="180"></canvas>
    </section>
  </div>
  <section class="full">
    <h3>JS 亮度示意</h3>
    <p class="fullHeatmapMeta">与左侧 JS 镜像同一套 GI→toneColor 映射；用于观察光照覆盖。</p>
    <canvas id="viewDiff" width="640" height="360"></canvas>
  </section>

  <script src="./lumen_lite_logic.js"></script>
  <script>
    const jsCanvas = document.getElementById("viewJs");
    const jsCtx = jsCanvas.getContext("2d");
    const seedCanvas = document.getElementById("viewSeed");
    const seedCtx = seedCanvas.getContext("2d");
    const diffCanvas = document.getElementById("viewDiff");
    const diffCtx = diffCanvas.getContext("2d");

    const w = jsCanvas.width;
    const h = jsCanvas.height;
    const stripW = diffCanvas.width;
    const stripH = diffCanvas.height;

    const diffImg = diffCtx.createImageData(stripW, stripH);
    const diffPx = diffImg.data;

    const lumaGainEl = document.getElementById("lumaGain");
    const stressFactorEl = document.getElementById("stressFactor");
    const toggleProbeBtn = document.getElementById("toggleProbe");
    const toggleJsBtn = document.getElementById("toggleJs");
    const toggleSeedBtn = document.getElementById("toggleSeed");
    const fpsJsEl = document.getElementById("fpsJs");
    const fpsSeedEl = document.getElementById("fpsSeed");
    const jsComputeMsEl = document.getElementById("jsComputeMs");
    const jsPresentMsEl = document.getElementById("jsPresentMs");
    const seedComputeMsEl = document.getElementById("seedComputeMs");
    const seedPresentMsEl = document.getElementById("seedPresentMs");
    const statusEl = document.getElementById("status");

    let gridW = 0;
    let gridH = 0;
    let jsOcc = null;
    let jsEmi = null;
    let jsDirect = null;
    let jsGiA = null;
    let jsGiB = null;
    let jsLuma = null;
    let seedLuma = null;
    let jsBufCan = null;
    let jsBufCtx = null;

    let seedReady = false;
    let seedBufCan = null;
    let seedBufCtx = null;
    let showProbe = false;
    let mouseX = w * 0.55;
    let mouseY = h * 0.22;
    let jsFrames = 0;
    let seedFrames = 0;
    let lastJsFpsTs = performance.now();
    let lastSeedFpsTs = performance.now();
    let seedFault = false;
    let runJs = true;
    let runSeed = true;

    toggleProbeBtn.addEventListener("click", () => {
      showProbe = !showProbe;
      toggleProbeBtn.textContent = showProbe ? "隐藏网格" : "显示网格";
    });
    toggleJsBtn.addEventListener("click", () => {
      runJs = !runJs;
      toggleJsBtn.textContent = runJs ? "暂停左侧" : "恢复左侧";
    });
    toggleSeedBtn.addEventListener("click", () => {
      runSeed = !runSeed;
      toggleSeedBtn.textContent = runSeed ? "暂停右侧" : "恢复右侧";
    });

    lumaGainEl.addEventListener("input", () => drawJsLumaStrip());

    function updateMouse(e) {
      const rect = e.currentTarget.getBoundingClientRect();
      const sx = w / rect.width;
      const sy = h / rect.height;
      mouseX = (e.clientX - rect.left) * sx;
      mouseY = (e.clientY - rect.top) * sy;
      if (seedReady) {
        lumenSetLight(mouseX * (lumen.w / w), mouseY * (lumen.h / h));
      }
    }
    jsCanvas.addEventListener("mousemove", updateMouse);
    seedCanvas.addEventListener("mousemove", updateMouse);
    diffCanvas.addEventListener("mousemove", updateMouse);

    function sIdx(x, y) {
      return y * gridW + x;
    }

    function clamp01(v) {
      return Math.max(0, Math.min(1, v));
    }

    function toNum(v) {
      // 兼容 VM 里可能出现的 boxed number（如 { value: 1.23 }）
      if (v && typeof v === "object" && "value" in v) {
        const n = Number(v.value);
        return Number.isFinite(n) ? n : 0;
      }
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function getSeedOccAt(x, y) {
      if (typeof lumen !== "object" || !lumen) return 0;
      if (Array.isArray(lumen.occ1)) {
        const i = y * gridW + x;
        return toNum(lumen.occ1[i]);
      }
      return toNum(lumen.occ?.[y]?.[x]);
    }

    function getSeedEmiAt(x, y) {
      if (typeof lumen !== "object" || !lumen) return 0;
      if (Array.isArray(lumen.emi1)) {
        const i = y * gridW + x;
        return toNum(lumen.emi1[i]);
      }
      return toNum(lumen.emi?.[y]?.[x]);
    }

    function getSeedGiAt(x, y) {
      if (typeof lumen !== "object" || !lumen) return 0;
      if (Array.isArray(lumen.gi1)) {
        const i = y * gridW + x;
        return toNum(lumen.gi1[i]);
      }
      return toNum(lumen.gi?.[y]?.[x]);
    }

    function toneColor(v, solid) {
      const t = v / (1 + v);
      if (solid) return [38, 46, 72, t];
      return [
        Math.floor(18 + 235 * t),
        Math.floor(24 + 225 * t),
        Math.floor(40 + 255 * t),
        t
      ];
    }

    function setupBuffers(width, height) {
      gridW = width;
      gridH = height;
      if (!Number.isFinite(gridW) || !Number.isFinite(gridH) || gridW <= 0 || gridH <= 0) {
        return false;
      }
      jsOcc = new Uint8Array(gridW * gridH);
      jsEmi = new Float32Array(gridW * gridH);
      jsDirect = new Float32Array(gridW * gridH);
      jsGiA = new Float32Array(gridW * gridH);
      jsGiB = new Float32Array(gridW * gridH);
      jsLuma = new Float32Array(gridW * gridH);
      seedLuma = new Float32Array(gridW * gridH);

      jsBufCan = document.createElement("canvas");
      jsBufCan.width = gridW;
      jsBufCan.height = gridH;
      jsBufCtx = jsBufCan.getContext("2d");

      seedBufCan = document.createElement("canvas");
      seedBufCan.width = gridW;
      seedBufCan.height = gridH;
      seedBufCtx = seedBufCan.getContext("2d");
      return !!jsBufCtx && !!seedBufCtx;
    }

    function buildFallbackScene() {
      jsOcc.fill(0);
      jsEmi.fill(0);

      // ground
      for (let x = 0; x < gridW; x++) {
        jsOcc[sIdx(x, gridH - 3)] = 1;
        jsOcc[sIdx(x, gridH - 2)] = 1;
        jsOcc[sIdx(x, gridH - 1)] = 1;
      }

      // pillars
      let x1 = Math.floor(gridW * 0.2);
      for (let y = Math.floor(gridH * 0.25); y < gridH - 3; y++) {
        jsOcc[sIdx(x1, y)] = 1;
        jsOcc[sIdx(x1 + 1, y)] = 1;
      }

      let x2 = Math.floor(gridW * 0.48);
      for (let y = Math.floor(gridH * 0.35); y < gridH - 3; y++) {
        jsOcc[sIdx(x2, y)] = 1;
        jsOcc[sIdx(x2 + 1, y)] = 1;
        jsOcc[sIdx(x2 + 2, y)] = 1;
      }

      let x3 = Math.floor(gridW * 0.76);
      for (let y = Math.floor(gridH * 0.28); y < gridH - 3; y++) {
        jsOcc[sIdx(x3, y)] = 1;
        jsOcc[sIdx(x3 + 1, y)] = 1;
      }

      // emissive points
      jsEmi[sIdx(3, 2)] = 1.0;
      jsEmi[sIdx(gridW - 4, 2)] = 0.75;
    }

    function jsShadow(x, y, lx, ly) {
      let dx = lx - x;
      let dy = ly - y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) return 1.0;
      let steps = Math.floor(dist * 1.15);
      if (steps < 1) steps = 1;
      for (let i = 1; i < steps; i++) {
        const t = i / steps;
        const sx = Math.floor(x + dx * t);
        const sy = Math.floor(y + dy * t);
        if (sx >= 0 && sx < gridW && sy >= 0 && sy < gridH) {
          if (jsOcc[sIdx(sx, sy)] === 1) return 0.08;
        }
      }
      return 1.0;
    }

    function jsComputeDirect() {
      const radius = Math.max(10, Math.floor(gridW * 0.32));
      const lx = mouseX * (gridW / w);
      const ly = mouseY * (gridH / h);
      for (let y = 0; y < gridH; y++) {
        for (let x = 0; x < gridW; x++) {
          const i = sIdx(x, y);
          if (jsOcc[i] === 1) {
            jsDirect[i] = 0;
            continue;
          }
          const dx = lx - x;
          const dy = ly - y;
          const d = Math.sqrt(dx * dx + dy * dy);
          let val = 0.02 + jsEmi[i] * 1.7;
          if (d < radius) {
            const atten = 1 - d / radius;
            const shf = jsShadow(x, y, lx, ly);
            val += atten * atten * shf;
          }
          jsDirect[i] = val;
        }
      }
    }

    function jsDiffuse(iterations) {
      jsGiA.set(jsDirect);
      for (let it = 0; it < iterations; it++) {
        for (let y = 0; y < gridH; y++) {
          for (let x = 0; x < gridW; x++) {
            const i = sIdx(x, y);
            if (jsOcc[i] === 1) {
              jsGiB[i] = 0;
              continue;
            }
            const base = jsGiA[i] * 0.34;
            let acc = 0;
            let n = 0;
            for (let oy = -1; oy <= 1; oy++) {
              for (let ox = -1; ox <= 1; ox++) {
                if (ox === 0 && oy === 0) continue;
                const nx = x + ox;
                const ny = y + oy;
                if (nx < 0 || nx >= gridW || ny < 0 || ny >= gridH) continue;
                const ni = sIdx(nx, ny);
                if (jsOcc[ni] === 0) {
                  acc += jsGiA[ni];
                  n++;
                }
              }
            }
            jsGiB[i] = n > 0 ? base + (acc / n) * 0.62 : base;
          }
        }
        const tmp = jsGiA;
        jsGiA = jsGiB;
        jsGiB = tmp;
      }
    }

    function drawFieldToCanvas(field, occField, bufCtx, outCtx, lumaOut) {
      if (!bufCtx || !outCtx || gridW <= 0 || gridH <= 0 || !field || !occField || !lumaOut) return;
      const img = bufCtx.createImageData(gridW, gridH);
      const d = img.data;
      for (let y = 0; y < gridH; y++) {
        for (let x = 0; x < gridW; x++) {
          const i = sIdx(x, y);
          const c = toneColor(clamp01(field[i]), occField[i] === 1);
          const p = i * 4;
          d[p] = c[0];
          d[p + 1] = c[1];
          d[p + 2] = c[2];
          d[p + 3] = 255;
          lumaOut[i] = c[3];
        }
      }
      bufCtx.putImageData(img, 0, 0);
      outCtx.imageSmoothingEnabled = false;
      outCtx.drawImage(bufCtx.canvas, 0, 0, w, h);
    }

    function drawGridOverlay(ctx) {
      ctx.strokeStyle = "rgba(130,180,255,0.18)";
      const step = Math.max(2, Math.floor(w / 16));
      for (let x = 0; x <= w; x += step) {
        ctx.beginPath();
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, h);
        ctx.stroke();
      }
      for (let y = 0; y <= h; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(w, y + 0.5);
        ctx.stroke();
      }
    }

    function bootSeed() {
      if (!setupBuffers(128, 72)) {
        statusEl.textContent = "状态：Canvas 初始化失败";
        return false;
      }
      buildFallbackScene();

      if (typeof lumenInit !== "function" || typeof lumenStep !== "function" || typeof lumenSetLight !== "function") {
        statusEl.textContent = "状态：SeedLang 逻辑未加载（右侧显示 JS 回退）";
        return false;
      }
      lumenInit(gridW, gridH);
      lumenSetLight(mouseX * (lumen.w / w), mouseY * (lumen.h / h));

      for (let y = 0; y < gridH; y++) {
        for (let x = 0; x < gridW; x++) {
          const i = sIdx(x, y);
          // 以 Seed 场景为主，读失败时保留 fallback
          const occV = getSeedOccAt(x, y);
          const emiV = getSeedEmiAt(x, y);
          if (occV === 0 || occV === 1) jsOcc[i] = occV;
          if (Number.isFinite(emiV)) jsEmi[i] = emiV;
        }
      }
      seedReady = true;
      statusEl.textContent = "状态：对比运行中";
      return true;
    }

    function heatmapCellIndex(x, y, bw, bh) {
      const siX = Math.min(gridW - 1, Math.max(0, Math.floor(((x + 0.5) / bw) * gridW)));
      const siY = Math.min(gridH - 1, Math.max(0, Math.floor(((y + 0.5) / bh) * gridH)));
      return sIdx(siX, siY);
    }

    function syncJsLumaFromGi() {
      if (gridW <= 0 || gridH <= 0 || !jsGiA || !jsLuma) return;
      for (let y = 0; y < gridH; y++) {
        for (let x = 0; x < gridW; x++) {
          const i = sIdx(x, y);
          const c = toneColor(clamp01(jsGiA[i]), jsOcc[i] === 1);
          jsLuma[i] = c[3];
        }
      }
    }

    function drawJsLumaStrip() {
      if (gridW <= 0 || gridH <= 0 || !jsGiA || !jsLuma) return;
      syncJsLumaFromGi();
      const gain = Number(lumaGainEl.value) || 1;
      for (let y = 0; y < stripH; y++) {
        for (let x = 0; x < stripW; x++) {
          const si = heatmapCellIndex(x, y, stripW, stripH);
          const v = clamp01(jsLuma[si] * gain * 0.5);
          const out = (y * stripW + x) * 4;
          diffPx[out] = Math.floor(255 * v);
          diffPx[out + 1] = Math.floor(80 * (1 - v) + 30 * v);
          diffPx[out + 2] = Math.floor(255 * (1 - v));
          diffPx[out + 3] = 255;
        }
      }
      diffCtx.putImageData(diffImg, 0, 0);
    }

    function drawSeedAndDiff() {
      if (!seedReady) return;
      if (gridW <= 0 || gridH <= 0 || !seedBufCtx) return;
      const gi = new Float32Array(gridW * gridH);
      const occField = new Uint8Array(gridW * gridH);
      for (let y = 0; y < gridH; y++) {
        for (let x = 0; x < gridW; x++) {
          const i = sIdx(x, y);
          gi[i] = getSeedGiAt(x, y);
          occField[i] = getSeedOccAt(x, y) !== 0 ? 1 : 0;
        }
      }
      drawFieldToCanvas(gi, occField, seedBufCtx, seedCtx, seedLuma);
    }

    function drawSeedFallback() {
      if (!seedBufCtx) return;
      drawFieldToCanvas(jsGiA, jsOcc, seedBufCtx, seedCtx, seedLuma);
    }

    function jsLoop(ts) {
      if (gridW <= 0 || gridH <= 0 || !jsBufCtx) {
        requestAnimationFrame(jsLoop);
        return;
      }
      const stress = Math.max(1, Math.floor(Number(stressFactorEl.value) || 1));
      const t0 = performance.now();
      if (runJs) {
        for (let i = 0; i < stress; i++) {
          jsComputeDirect();
          jsDiffuse(4);
        }
      }
      const t1 = performance.now();
      if (runJs) {
        drawFieldToCanvas(jsGiA, jsOcc, jsBufCtx, jsCtx, jsLuma);
        if (showProbe) {
          drawGridOverlay(jsCtx);
        }
      }
      const t2 = performance.now();
      jsComputeMsEl.textContent = (t1 - t0).toFixed(2);
      jsPresentMsEl.textContent = (t2 - t1).toFixed(2);

      if (runJs) jsFrames += 1;
      if (ts - lastJsFpsTs >= 1000) {
        fpsJsEl.textContent = String(jsFrames);
        jsFrames = 0;
        lastJsFpsTs = ts;
      }
      drawJsLumaStrip();
      requestAnimationFrame(jsLoop);
    }

    function seedLoop(ts) {
      if (gridW <= 0 || gridH <= 0 || !seedBufCtx) {
        requestAnimationFrame(seedLoop);
        return;
      }
      const stress = Math.max(1, Math.floor(Number(stressFactorEl.value) || 1));
      const t0 = performance.now();
      try {
        if (runSeed) {
          if (seedReady && !seedFault) {
            lumenSetLight(mouseX * (lumen.w / w), mouseY * (lumen.h / h));
            for (let i = 0; i < stress; i++) {
              lumenStep();
            }
            const t1 = performance.now();
            drawSeedAndDiff();
            if (showProbe) {
              drawGridOverlay(seedCtx);
            }
            const t2 = performance.now();
            seedComputeMsEl.textContent = (t1 - t0).toFixed(2);
            seedPresentMsEl.textContent = (t2 - t1).toFixed(2);
          } else {
            const t1 = performance.now();
            drawSeedFallback();
            if (showProbe) {
              drawGridOverlay(seedCtx);
            }
            const t2 = performance.now();
            seedComputeMsEl.textContent = (t1 - t0).toFixed(2);
            seedPresentMsEl.textContent = (t2 - t1).toFixed(2);
          }
        }
      } catch (err) {
        seedFault = true;
        statusEl.textContent = "状态：Seed 运行异常，已切回右侧回退";
        // 让问题可见，避免“黑屏但无提示”
        try { console.error("[lumen seedLoop error]", err); } catch (_) {}
        drawSeedFallback();
        const t2 = performance.now();
        seedComputeMsEl.textContent = (t2 - t0).toFixed(2);
        seedPresentMsEl.textContent = "0.00";
      }
      if (runSeed) seedFrames += 1;
      if (ts - lastSeedFpsTs >= 1000) {
        fpsSeedEl.textContent = String(seedFrames);
        seedFrames = 0;
        lastSeedFpsTs = ts;
      }

      requestAnimationFrame(seedLoop);
    }

    bootSeed();
    requestAnimationFrame(jsLoop);
    requestAnimationFrame(seedLoop);
  </script>
</body>
</html>
